# =========================================================
# Server
# =========================================================
server.port=8080

# =========================================================
# DataSource — MySQL
# =========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/empleados?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / Hibernate
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Let Spring Boot / Hibernate auto-detect MySQL dialect
spring.jpa.open-in-view=false

# =========================================================
# Apache CXF
# =========================================================
# All SOAP endpoints are published under /ws
cxf.path=/ws

# Internal URL used by the REST controller to call the SOAP service
soap.service.url=http://localhost:8080/ws/empleados

# =========================================================
# Jackson — serialize LocalDate as ISO string
# =========================================================
spring.jackson.serialization.write-dates-as-timestamps=false

# =========================================================
# Logging — suppress noise
# =========================================================
# Suppress "No static resource favicon.ico" error logs
spring.mvc.favicon.enabled=false
logging.level.org.springframework.web.servlet.resource=WARN
logging.level.org.springframework.web=INFO
logging.level.com.prueba=DEBUG
